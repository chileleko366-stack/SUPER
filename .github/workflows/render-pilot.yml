name: Render Pilot (Mind Mosaic only)

# Phase 7 pilot: single channel, manually triggered, to prove the full
# pipeline (Firecrawl -> NIM -> Piper TTS -> Remotion render) actually works
# on a real GitHub Actions runner before expanding to the 10-channel matrix.

on:
  workflow_dispatch: {}

jobs:
  render-mind-mosaic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
        # Confirmed via a real failed run (job 86182420980) that ffmpeg is
        # NOT preinstalled on ubuntu-latest -- corrects the assumption in
        # research/render-technicals.md, which should be fixed too.

      - name: Install Node deps
        run: npm install

      - name: Install Python deps
        run: pip install -r pipeline/requirements.txt

      - name: Download Piper voice model (CC-BY licensed en_US-libritts_r)
        run: |
          mkdir -p .voices
          cd .voices
          python -m piper.download_voices en_US-libritts_r-medium

      - name: Run channel pipeline (Firecrawl -> NIM -> Piper TTS -> props.json)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
        run: python pipeline/run_channel.py --channel mind-mosaic --run-id "gha-${{ github.run_id }}"

      - name: Render with Remotion
        run: |
          npx remotion render src/remotion/index.ts Explainer \
            "out/mind-mosaic/gha-${{ github.run_id }}/render.mp4" \
            --props="out/mind-mosaic/gha-${{ github.run_id }}/props.json"

      - name: Upload rendered clip + pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mind-mosaic-pilot-${{ github.run_id }}
          path: |
            out/mind-mosaic/gha-${{ github.run_id }}/render.mp4
            out/mind-mosaic/gha-${{ github.run_id }}/props.json
            out/mind-mosaic/gha-${{ github.run_id }}/script.json
            out/mind-mosaic/gha-${{ github.run_id }}/topic.json
          if-no-files-found: error
